name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix structure
        # Tohle vytvoří složku app a naháže tam všechny rozházené soubory
        run: |
          mkdir -p app
          mv root.tsx app/ 2>/dev/null || true
          mv page.jsx app/ 2>/dev/null || true
          mv page.tsx app/ 2>/dev/null || true
          mv layouts.ts app/ 2>/dev/null || true
          mv global.css app/ 2>/dev/null || true
          mv index.css app/ 2>/dev/null || true
          mv not-found.tsx app/ 2>/dev/null || true
          mv route*.js app/ 2>/dev/null || true
          mv page*.jsx app/ 2>/dev/null || true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npx react-router build
        env:
          REACT_ROUTER_APP_DIR: app

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/client

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
