name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        # Teď už robot použije nastavení z opraveného configu
        run: npx react-router build

      - name: Determine Deployment Directory
        id: fix-path
        run: |
          if [ -d "build/client" ]; then
            echo "out_path=build/client" >> $GITHUB_OUTPUT
          elif [ -d "dist" ]; then
            echo "out_path=dist" >> $GITHUB_OUTPUT
          else
            echo "out_path=build" >> $GITHUB_OUTPUT
          fi

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.fix-path.outputs.out_path }}

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
